<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة القوانين الرقمية</title>
    <style>
        :root { --accent: #c29d5f; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; margin: 0; text-align: center; }
        h1 { color: var(--accent); margin-bottom: 30px; font-size: 28px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .book-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; transition: 0.3s; display: block; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .book-title { font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .book-desc { font-size: 14px; color: #94a3b8; }
        .footer { margin-top: 50px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

    <h1>📚 منصة الاختبارات القانونية</h1>
    <p style="color: #94a3b8; margin-bottom: 40px;">اختر الكتاب لتبدأ الاختبار</p>

    <div class="grid">
        <a href="https://yourusername.github.io/law-constitutional-1/" class="book-card">
            <div class="book-title">القانون الدستوري</div>
            <div class="book-desc">د. حميد حنون - دراسة تحليلية لدساتير العراق</div>
        </a>

        <a href="https://yourusername.github.io/administrative-judiciary/" class="book-card">
            <div class="book-title">القضاء الإداري</div>
            <div class="book-desc">اختبارات شاملة في قانون القضاء الإداري العراقي</div>
        </a>

        </div>

    <div class="footer">
        بوابة التدريب القانوني المستمر
    </div>

</body>
</html>
