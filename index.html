<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة القانونية الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #c29d5f; --bg: #0b1120; --card: #161f32; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; text-align: center; line-height: 1.6; }
        
        header { padding: 30px 15px; background: rgba(30, 41, 59, 0.5); border-bottom: 1px solid rgba(194, 157, 95, 0.3); }
        h1 { color: var(--accent); font-size: 22px; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 13px; }

        .search-container { margin: -20px auto 25px; max-width: 85%; }
        #searchInput { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--accent); background: var(--card); color: white; font-size: 14px; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; max-width: 95%; margin: 20px auto; padding: 0 10px; }
        
        /* تقليل حجم البطاقة وجعلها أكثر أناقة */
        .card { background: var(--card); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); padding: 15px; position: relative; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .icon-box { font-size: 28px; color: var(--accent); margin: 10px 0; }
        .badge { position: absolute; top: 10px; left: 10px; background: #10b981; color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        
        h3 { margin: 5px 0; font-size: 16px; color: var(--text); }
        .info { color: #94a3b8; font-size: 11px; margin-bottom: 15px; }
        
        /* أزرار أصغر وأكثر تناسقاً */
        .btn { background: var(--accent); color: #0b1120; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 13px; transition: 0.3s; display: block; }
        
        .stats-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .stat-item { font-size: 10px; color: var(--accent); background: rgba(194, 157, 95, 0.1); padding: 2px 6px; border-radius: 4px; }

        footer { margin-top: 40px; padding: 30px 15px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.05); }
        .tg-btn { background: #0088cc; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-gavel"></i> منصة الاختبارات القانونية</h1>
        <p class="subtitle">بوابة التدريب القانوني المستمر</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="ابحث عن كتاب..." onkeyup="filterBooks()">
    </div>

    <div class="grid" id="booksGrid">
        <div class="card">
            <span class="badge" style="background: #10b981;">مكتمل</span>
            <div class="icon-box"><i class="fas fa-university"></i></div>
            <h3>القانون الدستوري</h3>
            <p class="info">د. حميد حنون - دراسة تحليلية</p>
            <div class="stats-row">
                <span class="stat-item"><i class="fas fa-layer-group"></i> 20 فصل</span>
                <span class="stat-item"><i class="fas fa-question-circle"></i> +500 سؤال</span>
            </div>
            <a href="https://mohammed1920.github.io/law-test/" class="btn">دخول</a>
        </div>

        <div class="card">
            <span class="badge" style="background: #f59e0b;">قيد الإضافة</span>
            <div class="icon-box"><i class="fas fa-balance-scale"></i></div>
            <h3>القضاء الإداري</h3>
            <p class="info">مراجعة شاملة للمواد القضائية</p>
            <div class="stats-row">
                <span class="stat-item"><i class="fas fa-layer-group"></i> جاري العمل</span>
                <span class="stat-item"><i class="fas fa-question-circle"></i> متجدد</span>
            </div>
            <a href="https://mohammed1920.github.io/administrative-judiciary/" class="btn">دخول</a>
        </div>
    </div>

    <footer>
        <a href="https://t.me/M5M5P" class="tg-btn" target="_blank">
            <i class="fab fa-telegram-plane"></i> انضم لقناتنا
        </a>
        <p style="font-size: 11px; color: #64748b; margin-top: 20px;">&copy; 2026 جميع الحقوق محفوظة</p>
    </footer>

    <script>
        function filterBooks() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
